<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Reaction - Online Multiplayer</title>
    <style>
        :root {
            --bg-color: #121212;
            --grid-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-info {
            margin-bottom: 20px;
            text-align: center;
        }

        .status {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        canvas {
            border: 2px solid var(--grid-color);
            background-color: #1a1a1a;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background: #555; }
        
        #you-are {
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="game-info">
        <div id="status" class="status">Connecting to Server...</div>
        <div id="you-are"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <button id="resetBtn">Reset Game for Everyone</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 1. YOUR FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBl0Guof6ujquBxuvn0p9p_J6_obYz7ouQ",
            authDomain: "chain-reaction-67958.firebaseapp.com",
            databaseURL: "https://chain-reaction-67958-default-rtdb.firebaseio.com", // Added this line!
            projectId: "chain-reaction-67958",
            storageBucket: "chain-reaction-67958.firebasestorage.app",
            messagingSenderId: "862222493933",
            appId: "1:862222493933:web:f60adc180cb3c1eb1344e4"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Game Variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const youAreDiv = document.getElementById('you-are');

        const ROWS = 9;
        const COLS = 6;
        const CELL_SIZE = 60;
        canvas.width = COLS * CELL_SIZE;
        canvas.height = ROWS * CELL_SIZE;

        let board = [];
        let currentPlayerIndex = 0; 
        let isAnimating = false;
        let gameActive = true;
        let lastMoveId = 0; // To prevent playing the same move twice

        // Player Info
        let myPlayerNumber = parseInt(prompt("Which Player are you? (Enter 1, 2, 3, or 4)"));
        if (isNaN(myPlayerNumber) || myPlayerNumber < 1 || myPlayerNumber > 4) myPlayerNumber = 1;
        let myName = prompt("Enter your Name:") || `Player ${myPlayerNumber}`;

        const players = [
            { id: 1, name: "Player 1", color: "#ff4757" }, // Neon Red
            { id: 2, name: "Player 2", color: "#2ed573" }, // Neon Green
            { id: 3, name: "Player 3", color: "#1e90ff" }, // Neon Blue
            { id: 4, name: "Player 4", color: "#ffa502" }  // Neon Orange
        ];

        // Register my name in Firebase
        set(ref(db, `players/${myPlayerNumber - 1}/name`), myName);
        youAreDiv.innerText = `You are playing as: ${myName} (Color: ${players[myPlayerNumber-1].color})`;

        // Sync Player Names from Firebase
        onValue(ref(db, 'players'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for(let i = 0; i < 4; i++) {
                    if(data[i] && data[i].name) players[i].name = data[i].name;
                }
                updateStatusUI();
            }
        });

        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    let cap = 4;
                    if ((r === 0 || r === ROWS - 1) && (c === 0 || c === COLS - 1)) cap = 2; 
                    else if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) cap = 3; 

                    board[r][c] = { owner: 0, count: 0, capacity: cap };
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#333";
            for (let i = 0; i <= COLS; i++) ctx.strokeRect(i * CELL_SIZE, 0, 0, canvas.height);
            for (let i = 0; i <= ROWS; i++) ctx.strokeRect(0, i * CELL_SIZE, canvas.width, 0);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = board[r][c];
                    if (cell.count > 0) {
                        const playerColor = players.find(p => p.id === cell.owner).color;
                        const x = c * CELL_SIZE + CELL_SIZE / 2;
                        const y = r * CELL_SIZE + CELL_SIZE / 2;
                        
                        ctx.fillStyle = playerColor;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = playerColor;

                        if (cell.count === 1) {
                            ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
                        } else if (cell.count === 2) {
                            ctx.beginPath(); ctx.arc(x - 8, y, 10, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 8, y, 10, 0, Math.PI * 2); ctx.fill();
                        } else if (cell.count === 3) {
                            ctx.beginPath(); ctx.arc(x, y - 8, 10, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(x - 8, y + 8, 10, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 8, y + 8, 10, 0, Math.PI * 2); ctx.fill();
                        }
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        async function handleExplosion(r, c) {
            if (board[r][c].count < board[r][c].capacity) return;

            board[r][c].count = 0;
            board[r][c].owner = 0;

            const neighbors = [
                { nr: r - 1, nc: c }, { nr: r + 1, nc: c },
                { nr: r, nc: c - 1 }, { nr: r, nc: c + 1 }
            ];

            const currentOwnerId = players[currentPlayerIndex].id;

            for (const n of neighbors) {
                if (n.nr >= 0 && n.nr < ROWS && n.nc >= 0 && n.nc < COLS) {
                    board[n.nr][n.nc].owner = currentOwnerId;
                    board[n.nr][n.nc].count++;
                    draw();
                    await new Promise(res => setTimeout(res, 100)); // Animation delay
                    await handleExplosion(n.nr, n.nc);
                }
            }
        }

        function updateStatusUI() {
            const currentPlayer = players[currentPlayerIndex];
            statusDiv.innerText = `${currentPlayer.name}'s Turn`;
            statusDiv.style.color = currentPlayer.color;
            
            if (players[currentPlayerIndex].id === myPlayerNumber) {
                statusDiv.innerText += " (YOUR TURN)";
            }
        }

        // LISTEN FOR MOVES FROM FIREBASE
        onValue(ref(db, 'game/lastMove'), async (snapshot) => {
            const move = snapshot.val();
            if (move && move.id !== lastMoveId) {
                lastMoveId = move.id;
                isAnimating = true;

                board[move.r][move.c].owner = players[currentPlayerIndex].id;
                board[move.r][move.c].count++;
                
                await handleExplosion(move.r, move.c);
                
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                updateStatusUI();
                
                isAnimating = false;
                draw();
            }
        });

        // LISTEN FOR GAME RESETS
        onValue(ref(db, 'game/reset'), (snapshot) => {
            const resetData = snapshot.val();
            if (resetData) {
                initBoard();
                currentPlayerIndex = 0;
                gameActive = true;
                isAnimating = false;
                updateStatusUI();
                draw();
            }
        });

        // SEND MOVE TO FIREBASE ON CLICK
        canvas.addEventListener('click', (e) => {
            // Only allow click if it's YOUR turn, game is active, and no animations are running
            if (!gameActive || isAnimating || players[currentPlayerIndex].id !== myPlayerNumber) {
                return; 
            }

            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const r = Math.floor((e.clientY - rect.top) / CELL_SIZE);
            const currentPlayerId = players[currentPlayerIndex].id;

            // Check if valid move
            if (board[r][c].owner === 0 || board[r][c].owner === currentPlayerId) {
                // Send to Firebase instead of playing locally immediately
                set(ref(db, 'game/lastMove'), {
                    r: r,
                    c: c,
                    id: Date.now() // Unique ID so everyone knows it's a new move
                });
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            set(ref(db, 'game/reset'), Date.now()); // Trigger reset for everyone
        });

        initBoard();
        draw();
    </script>
</body>
</html>
